<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Estudos — Concurso</title>
    <style>
        /* ============================================================
           VARIÁVEIS CSS — Tema Dark Moderno
           ============================================================ */
        :root {
            --bg-primary: #0d0d17;
            --bg-secondary: #141428;
            --bg-tertiary: #1a1a30;
            --bg-sidebar: #111122;
            --bg-card: #1c1c36;
            --bg-hover: #232344;
            --bg-active: #2a2a50;
            --bg-accent: #7c3aed;
            --bg-accent-hover: #8b5cf6;
            --bg-accent-muted: rgba(124, 58, 237, 0.12);
            --bg-accent-muted-hover: rgba(124, 58, 237, 0.22);
            --text-primary: #e2e2f0;
            --text-secondary: #b0b0c8;
            --text-muted: #7878a0;
            --text-accent: #a78bfa;
            --border-subtle: #252540;
            --border-accent: #7c3aed;
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.45);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.35);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.25);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --transition-fast: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-sidebar: 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 290px;
            --topbar-height: 52px;
            --font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
        }

        /* ============================================================
           RESET & BASE
           ============================================================ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            letter-spacing: 0.01em;
        }

        /* ============================================================
           SCROLLBAR PERSONALIZADO
           ============================================================ */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a58;
            border-radius: 10px;
            transition: background var(--transition-fast);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #52527a;
        }
        ::-webkit-scrollbar-corner {
            background: transparent;
        }

        /* ============================================================
           LAYOUT PRINCIPAL
           ============================================================ */
        #app-container {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* ============================================================
           SIDEBAR
           ============================================================ */
        #sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: width var(--transition-sidebar), min-width var(--transition-sidebar), transform var(--transition-sidebar), opacity var(--transition-sidebar);
            overflow: hidden;
            position: relative;
            box-shadow: var(--shadow-lg);
            flex-shrink: 0;
        }

        #sidebar.collapsed {
            width: 0;
            min-width: 0;
            opacity: 0;
            pointer-events: none;
            border-right: none;
            box-shadow: none;
        }

        /* Sidebar Header */
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px 14px 18px;
            border-bottom: 1px solid var(--border-subtle);
            gap: 10px;
            flex-shrink: 0;
            min-height: 60px;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-primary);
            letter-spacing: 0.02em;
            white-space: nowrap;
        }
        .sidebar-logo svg {
            flex-shrink: 0;
            opacity: 0.9;
        }
        .sidebar-logo .logo-dot {
            color: var(--text-accent);
        }

        .btn-close-sidebar {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }
        .btn-close-sidebar:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        /* Search dentro da sidebar */
        .sidebar-search-wrap {
            padding: 12px 16px;
            flex-shrink: 0;
            position: relative;
        }
        .sidebar-search-wrap .search-icon {
            position: absolute;
            left: 28px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }
        #sidebar-search {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-subtle);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 0.88rem;
            font-family: var(--font-family);
            outline: none;
            transition: all var(--transition-fast);
            letter-spacing: 0.01em;
        }
        #sidebar-search::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }
        #sidebar-search:focus {
            border-color: var(--border-accent);
            box-shadow: 0 0 0 3px var(--bg-accent-muted);
            background: var(--bg-card);
        }

        /* Lista de decks (scrollável) */
        .sidebar-decks-list {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 8px 10px 16px 10px;
            scroll-behavior: smooth;
        }

        /* Deck item */
        .deck-group {
            margin-bottom: 4px;
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: background var(--transition-fast);
        }
        .deck-group.hidden-deck {
            display: none;
        }

        .deck-header {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 10px 12px;
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
            font-weight: 600;
            font-size: 0.92rem;
            color: var(--text-primary);
            white-space: nowrap;
        }
        .deck-header:hover {
            background: var(--bg-hover);
        }
        .deck-header .deck-icon {
            flex-shrink: 0;
            color: var(--text-accent);
            display: flex;
            align-items: center;
        }
        .deck-header .deck-chevron {
            margin-left: auto;
            flex-shrink: 0;
            transition: transform var(--transition-smooth);
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }
        .deck-group.expanded>.deck-header .deck-chevron {
            transform: rotate(0deg);
        }
        .deck-group:not(.expanded)>.deck-header .deck-chevron {
            transform: rotate(-90deg);
        }
        .deck-header .deck-badge {
            font-size: 0.7rem;
            background: var(--bg-accent-muted);
            color: var(--text-accent);
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 500;
            margin-left: 6px;
            letter-spacing: 0.03em;
        }

        /* Categorias */
        .deck-categories {
            overflow: hidden;
            transition: max-height var(--transition-smooth), opacity var(--transition-smooth);
            max-height: 2000px;
            opacity: 1;
        }
        .deck-group:not(.expanded)>.deck-categories {
            max-height: 0;
            opacity: 0;
        }

        .category-group {
            margin: 2px 0 2px 8px;
            border-radius: var(--radius-sm);
            overflow: hidden;
        }
        .category-group.hidden-category {
            display: none;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 7px 10px 7px 16px;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
            font-weight: 500;
            font-size: 0.83rem;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .category-header:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .category-header .cat-icon {
            flex-shrink: 0;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            transition: color var(--transition-fast);
        }
        .category-header:hover .cat-icon {
            color: var(--text-secondary);
        }
        .category-header .cat-chevron {
            margin-left: auto;
            flex-shrink: 0;
            transition: transform var(--transition-smooth);
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }
        .category-group.expanded>.category-header .cat-chevron {
            transform: rotate(0deg);
        }
        .category-group:not(.expanded)>.category-header .cat-chevron {
            transform: rotate(-90deg);
        }
        .category-header .cat-count {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-left: 4px;
            opacity: 0.7;
        }

        /* Itens */
        .category-items {
            overflow: hidden;
            transition: max-height var(--transition-smooth), opacity var(--transition-smooth);
            max-height: 1500px;
            opacity: 1;
        }
        .category-group:not(.expanded)>.category-items {
            max-height: 0;
            opacity: 0;
        }

        .resume-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px 7px 28px;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: nowrap;
            position: relative;
            margin: 1px 0;
        }
        .resume-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .resume-item.active {
            background: var(--bg-accent-muted);
            color: var(--text-accent);
            font-weight: 500;
            box-shadow: inset 3px 0 0 var(--bg-accent);
            border-radius: var(--radius-sm);
        }
        .resume-item .item-icon {
            flex-shrink: 0;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            transition: color var(--transition-fast);
        }
        .resume-item.active .item-icon {
            color: var(--text-accent);
        }
        .resume-item.hidden-item {
            display: none;
        }

        /* ============================================================
           MAIN AREA
           ============================================================ */
        #main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-width: 0;
            background: var(--bg-primary);
            position: relative;
            transition: all var(--transition-sidebar);
        }

        /* ============================================================
           TOP BAR
           ============================================================ */
        #topbar {
            display: flex;
            align-items: center;
            height: var(--topbar-height);
            min-height: var(--topbar-height);
            padding: 0 14px;
            gap: 10px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
            z-index: 50;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-smooth);
        }

        .topbar-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 7px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all var(--transition-fast);
            flex-shrink: 0;
            position: relative;
        }
        .topbar-btn:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }
        .topbar-btn:active {
            transform: scale(0.94);
            transition: transform 0.08s ease;
        }
        .topbar-btn.tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity var(--transition-fast);
            border: 1px solid var(--border-subtle);
            z-index: 200;
        }
        .topbar-btn.tooltip:hover::after {
            opacity: 1;
        }

        /* Breadcrumb */
        #breadcrumb-container {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            padding: 0 6px;
        }
        .breadcrumb-sep {
            color: var(--text-muted);
            font-size: 0.8rem;
            flex-shrink: 0;
            opacity: 0.5;
        }
        .breadcrumb-item {
            font-size: 0.84rem;
            color: var(--text-secondary);
            white-space: nowrap;
            cursor: default;
            transition: color var(--transition-fast);
            padding: 3px 6px;
            border-radius: var(--radius-sm);
            letter-spacing: 0.01em;
        }
        .breadcrumb-item.clickable {
            cursor: pointer;
        }
        .breadcrumb-item.clickable:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }
        .breadcrumb-item.current {
            color: var(--text-accent);
            font-weight: 600;
        }
        .breadcrumb-home {
            cursor: pointer;
            padding: 4px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            color: var(--text-muted);
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }
        .breadcrumb-home:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        /* Spacer */
        .topbar-spacer {
            flex: 1;
            min-width: 20px;
        }

        /* ============================================================
           CONTENT AREA (iframe + welcome)
           ============================================================ */
        #content-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Iframe */
        #resume-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
            /* O iframe herda o bg do arquivo carregado */
            opacity: 0;
            transition: opacity 0.35s ease;
            position: absolute;
            inset: 0;
            z-index: 10;
        }
        #resume-iframe.loaded {
            opacity: 1;
        }

        /* Loader */
        #iframe-loader {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        #iframe-loader.visible {
            opacity: 1;
        }
        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-subtle);
            border-top-color: var(--bg-accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Welcome Screen */
        #welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            z-index: 1;
            transition: opacity 0.3s ease;
        }
        #welcome-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .welcome-icon {
            margin-bottom: 20px;
            opacity: 0.7;
        }
        .welcome-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: 0.02em;
        }
        .welcome-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            max-width: 420px;
            line-height: 1.5;
            letter-spacing: 0.01em;
        }
        .welcome-stats {
            display: flex;
            gap: 24px;
            margin-top: 28px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .welcome-stat {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 16px 22px;
            text-align: center;
            min-width: 100px;
            transition: all var(--transition-fast);
        }
        .welcome-stat:hover {
            border-color: var(--border-accent);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .welcome-stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-accent);
            letter-spacing: 0.03em;
        }
        .welcome-stat-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ============================================================
           OVERLAY (mobile)
           ============================================================ */
        #sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 99;
            opacity: 0;
            transition: opacity var(--transition-sidebar);
            pointer-events: none;
        }
        #sidebar-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        /* ============================================================
           RESPONSIVIDADE
           ============================================================ */
        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100vh;
                z-index: 110;
                transform: translateX(0);
                box-shadow: var(--shadow-lg);
            }
            #sidebar.collapsed {
                transform: translateX(-100%);
                width: var(--sidebar-width);
                min-width: var(--sidebar-width);
                opacity: 1;
                pointer-events: none;
            }
            #sidebar-overlay {
                display: block;
            }
            #topbar {
                padding: 0 8px;
                gap: 6px;
            }
            .welcome-stats {
                gap: 12px;
            }
            .welcome-stat {
                padding: 12px 16px;
                min-width: 80px;
            }
            .welcome-stat-value {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <!-- ============================================================
    CONTAINER PRINCIPAL
    ============================================================ -->
    <div id="app-container">
        <!-- Overlay para mobile -->
        <div id="sidebar-overlay"></div>

        <!-- ============================================================
        SIDEBAR
        ============================================================ -->
        <aside id="sidebar">
            <!-- Header da Sidebar -->
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <!-- Ícone: Livro + Graduação -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
                        <line x1="8" y1="7" x2="16" y2="7"/>
                        <line x1="8" y1="11" x2="14" y2="11"/>
                    </svg>
                    <span>Hub<span class="logo-dot">.</span>Estudos</span>
                </div>
                <button class="btn-close-sidebar" id="btn-close-sidebar" title="Fechar sidebar" aria-label="Fechar sidebar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>

            <!-- Campo de Pesquisa -->
            <div class="sidebar-search-wrap">
                <span class="search-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </span>
                <input type="text" id="sidebar-search" placeholder="Filtrar resumos..." autocomplete="off" />
            </div>

            <!-- Lista de Decks (renderizada via JS) -->
            <nav class="sidebar-decks-list" id="sidebar-decks-list">
                <!-- Conteúdo dinâmico -->
            </nav>
        </aside>

        <!-- ============================================================
        ÁREA PRINCIPAL
        ============================================================ -->
        <div id="main-area">
            <!-- Top Bar -->
            <header id="topbar">
                <!-- Botão toggle sidebar -->
                <button class="topbar-btn tooltip" id="btn-toggle-sidebar" data-tooltip="Mostrar/Ocultar Sidebar" aria-label="Toggle sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="18" rx="1.5"/>
                        <rect x="14" y="3" width="7" height="18" rx="1.5"/>
                    </svg>
                </button>

                <!-- Botão Voltar / Home -->
                <button class="topbar-btn tooltip" id="btn-back" data-tooltip="Voltar ao início" aria-label="Voltar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
                    </svg>
                </button>

                <!-- Breadcrumb -->
                <div id="breadcrumb-container">
                    <span class="breadcrumb-home" id="breadcrumb-home" title="Início">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                            <polyline points="9 22 9 12 15 12 15 22"/>
                        </svg>
                    </span>
                    <span class="breadcrumb-item current" id="breadcrumb-text">Nenhum resumo selecionado</span>
                </div>

                <!-- Espaçador -->
                <div class="topbar-spacer"></div>

                <!-- Botão Tela Cheia -->
                <button class="topbar-btn tooltip" id="btn-fullscreen" data-tooltip="Tela Cheia" aria-label="Tela cheia">
                    <svg id="icon-fullscreen-enter" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
                        <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
                    </svg>
                    <svg id="icon-fullscreen-exit" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                        <polyline points="4 8 4 3 9 3"/><polyline points="20 16 20 21 15 21"/>
                        <line x1="4" y1="3" x2="11" y2="10"/><line x1="20" y1="21" x2="13" y2="14"/>
                    </svg>
                </button>
            </header>

            <!-- Área de Conteúdo -->
            <div id="content-area">
                <!-- Loader -->
                <div id="iframe-loader">
                    <div class="loader-spinner"></div>
                </div>
                <!-- Iframe -->
                <iframe id="resume-iframe" title="Visualizador de Resumo" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
                <!-- Tela de Boas-Vindas -->
                <div id="welcome-screen">
                    <div class="welcome-icon">
                        <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
                            <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
                            <line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/>
                            <circle cx="17" cy="7.5" r="1.5" fill="currentColor" stroke="none" opacity="0.6"/>
                        </svg>
                    </div>
                    <h1 class="welcome-title">Hub de Estudos</h1>
                    <p class="welcome-subtitle">Selecione um resumo na sidebar para começar a estudar. Use a pesquisa para encontrar conteúdos rapidamente.</p>
                    <div class="welcome-stats" id="welcome-stats">
                        <!-- Preenchido via JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================
    JAVASCRIPT
    ============================================================ -->
    <script>
        (function() {
            // ============================================================
            // CONFIGURAÇÃO: Array de Decks (estrutura preparada para
            // múltiplos decks — basta adicionar objetos neste array)
            // ============================================================
            const DECKS = [{
                id: 'deck-1',
                name: 'Deck 1',
                icon: 'book',
                categories: [{
                    name: 'Direito',
                    icon: 'folder',
                    items: [
                        { name: 'Direito Constitucional', file: 'DIREITO CONSTITUCIONAL.html' },
                        { name: 'Direito Administrativo', file: 'Direito Administrativo.html' },
                        { name: 'Direito Civil', file: 'DIREITO CIVIL.html' },
                        { name: 'Direito Penal', file: 'DIREITO PENAL.html' },
                        { name: 'Direito Processual Penal', file: 'direito processual penal.html' },
                    ],
                }, {
                    name: 'Administração',
                    icon: 'folder',
                    items: [
                        { name: 'Administração Pública e Gestão Pública',
                            file: 'Administração_Gestão Pública.html' },
                        { name: 'Administração Financeira e Orçamentária (AFO)',
                            file: 'Administração Financeira e Orçamentária.html' },
                    ],
                }, {
                    name: 'Complementar',
                    icon: 'folder',
                    items: [
                        { name: 'Direito Administrativo Complementar', file: 'Direito adm.html' },
                    ],
                }, ],
            },
            // Para adicionar Deck 2, Deck 3 etc., basta inserir mais objetos aqui:
            // {
            //   id: 'deck-2',
            //   name: 'Deck 2',
            //   icon: 'book',
            //   categories: [ ... ]
            // },
            ];

            // ============================================================
            // ÍCONES SVG INLINE (funções que retornam strings SVG)
            // ============================================================
            const ICONS = {
                book: (size = 18) =>
                    `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>`,
                folder: (size = 16) =>
                    `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>`,
                file: (size = 15) =>
                    `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
                chevronDown: (size = 14) =>
                    `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`,
                document: (size = 15) =>
                    `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
            };

            // ============================================================
            // ESTADO GLOBAL
            // ============================================================
            const state = {
                sidebarVisible: true,
                expandedDecks: new Set(['deck-1']), // IDs dos decks expandidos
                expandedCategories: new Set(), // "deckId|catIndex" strings
                activeResume: null, // { deckId, categoryIndex, itemIndex, deckName, categoryName, itemName, fileName }
                isFullscreen: false,
                searchQuery: '',
            };

            // ============================================================
            // REFERÊNCIAS DO DOM
            // ============================================================
            const $sidebar = document.getElementById('sidebar');
            const $sidebarDecksList = document.getElementById('sidebar-decks-list');
            const $sidebarSearch = document.getElementById('sidebar-search');
            const $sidebarOverlay = document.getElementById('sidebar-overlay');
            const $btnToggleSidebar = document.getElementById('btn-toggle-sidebar');
            const $btnCloseSidebar = document.getElementById('btn-close-sidebar');
            const $btnBack = document.getElementById('btn-back');
            const $btnFullscreen = document.getElementById('btn-fullscreen');
            const $breadcrumbText = document.getElementById('breadcrumb-text');
            const $breadcrumbHome = document.getElementById('breadcrumb-home');
            const $breadcrumbContainer = document.getElementById('breadcrumb-container');
            const $contentArea = document.getElementById('content-area');
            const $resumeIframe = document.getElementById('resume-iframe');
            const $iframeLoader = document.getElementById('iframe-loader');
            const $welcomeScreen = document.getElementById('welcome-screen');
            const $welcomeStats = document.getElementById('welcome-stats');
            const $iconFsEnter = document.getElementById('icon-fullscreen-enter');
            const $iconFsExit = document.getElementById('icon-fullscreen-exit');

            // ============================================================
            // PERSISTÊNCIA (localStorage)
            // ============================================================
            const STORAGE_KEYS = {
                sidebarVisible: 'hub_sidebarVisible',
                expandedDecks: 'hub_expandedDecks',
                expandedCategories: 'hub_expandedCategories',
                lastResume: 'hub_lastResume',
            };

            function saveToStorage(key, value) {
                try {
                    if (value instanceof Set) {
                        localStorage.setItem(key, JSON.stringify([...value]));
                    } else if (typeof value === 'object' && value !== null) {
                        localStorage.setItem(key, JSON.stringify(value));
                    } else {
                        localStorage.setItem(key, String(value));
                    }
                } catch (e) {
                    // localStorage pode não estar disponível
                }
            }

            function loadFromStorage(key, fallback) {
                try {
                    const raw = localStorage.getItem(key);
                    if (raw === null || raw === undefined) return fallback;
                    const parsed = JSON.parse(raw);
                    if (fallback instanceof Set && Array.isArray(parsed)) {
                        return new Set(parsed);
                    }
                    return parsed !== null && parsed !== undefined ? parsed : fallback;
                } catch (e) {
                    return fallback;
                }
            }

            function loadState() {
                state.sidebarVisible = loadFromStorage(STORAGE_KEYS.sidebarVisible, true);
                state.expandedDecks = loadFromStorage(STORAGE_KEYS.expandedDecks, new Set(['deck-1']));
                state.expandedCategories = loadFromStorage(STORAGE_KEYS.expandedCategories, new Set());
                const lastResume = loadFromStorage(STORAGE_KEYS.lastResume, null);
                if (lastResume && lastResume.deckId && lastResume.fileName) {
                    state.activeResume = lastResume;
                }
            }

            function persistState() {
                saveToStorage(STORAGE_KEYS.sidebarVisible, state.sidebarVisible);
                saveToStorage(STORAGE_KEYS.expandedDecks, state.expandedDecks);
                saveToStorage(STORAGE_KEYS.expandedCategories, state.expandedCategories);
                saveToStorage(STORAGE_KEYS.lastResume, state.activeResume);
            }

            // ============================================================
            // RENDERIZAÇÃO DA SIDEBAR
            // ============================================================
            function renderSidebar() {
                $sidebarDecksList.innerHTML = '';

                DECKS.forEach((deck) => {
                    const deckGroup = document.createElement('div');
                    deckGroup.className = 'deck-group';
                    deckGroup.dataset.deckId = deck.id;
                    if (state.expandedDecks.has(deck.id)) {
                        deckGroup.classList.add('expanded');
                    }

                    // Header do Deck
                    const deckHeader = document.createElement('div');
                    deckHeader.className = 'deck-header';
                    deckHeader.innerHTML = `
                        <span class="deck-icon">${ICONS.book(18)}</span>
                        <span>${escapeHTML(deck.name)}</span>
                        <span class="deck-badge">${countTotalItems(deck)}</span>
                        <span class="deck-chevron">${ICONS.chevronDown(14)}</span>
                    `;
                    deckHeader.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleDeck(deck.id);
                    });
                    deckGroup.appendChild(deckHeader);

                    // Container de categorias
                    const categoriesContainer = document.createElement('div');
                    categoriesContainer.className = 'deck-categories';

                    deck.categories.forEach((cat, catIndex) => {
                        const catGroup = document.createElement('div');
                        catGroup.className = 'category-group';
                        catGroup.dataset.categoryKey = `${deck.id}|${catIndex}`;
                        if (state.expandedCategories.has(`${deck.id}|${catIndex}`)) {
                            catGroup.classList.add('expanded');
                        }

                        // Header da Categoria
                        const catHeader = document.createElement('div');
                        catHeader.className = 'category-header';
                        catHeader.innerHTML = `
                            <span class="cat-icon">${ICONS.folder(15)}</span>
                            <span>${escapeHTML(cat.name)}</span>
                            <span class="cat-count">(${cat.items.length})</span>
                            <span class="cat-chevron">${ICONS.chevronDown(12)}</span>
                        `;
                        catHeader.addEventListener('click', (e) => {
                            e.stopPropagation();
                            toggleCategory(deck.id, catIndex);
                        });
                        catGroup.appendChild(catHeader);

                        // Itens
                        const itemsContainer = document.createElement('div');
                        itemsContainer.className = 'category-items';

                        cat.items.forEach((item, itemIndex) => {
                            const itemEl = document.createElement('div');
                            itemEl.className = 'resume-item';
                            itemEl.dataset.deckId = deck.id;
                            itemEl.dataset.catIndex = catIndex;
                            itemEl.dataset.itemIndex = itemIndex;
                            itemEl.dataset.searchText = (deck.name + ' ' + cat
                                .name + ' ' + item.name).toLowerCase();
                            itemEl.innerHTML = `
                                <span class="item-icon">${ICONS.document(14)}</span>
                                <span>${escapeHTML(item.name)}</span>
                            `;
                            // Verificar se é o item ativo
                            if (
                                state.activeResume &&
                                state.activeResume.deckId === deck.id &&
                                state.activeResume.categoryIndex === catIndex &&
                                state.activeResume.itemIndex === itemIndex
                            ) {
                                itemEl.classList.add('active');
                            }
                            itemEl.addEventListener('click', (e) => {
                                e.stopPropagation();
                                openResume(deck, catIndex, itemIndex, cat, item);
                            });
                            itemsContainer.appendChild(itemEl);
                        });

                        catGroup.appendChild(itemsContainer);
                        categoriesContainer.appendChild(catGroup);
                    });

                    deckGroup.appendChild(categoriesContainer);
                    $sidebarDecksList.appendChild(deckGroup);
                });

                // Aplicar filtro de pesquisa se houver
                if (state.searchQuery.trim()) {
                    applySearchFilter(state.searchQuery);
                }
            }

            function countTotalItems(deck) {
                let count = 0;
                deck.categories.forEach(cat => { count += cat.items.length; });
                return count;
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ============================================================
            // NAVEGAÇÃO E AÇÕES
            // ============================================================
            function toggleDeck(deckId) {
                if (state.expandedDecks.has(deckId)) {
                    state.expandedDecks.delete(deckId);
                } else {
                    state.expandedDecks.add(deckId);
                }
                // Se estiver filtrando, não colapsar — manter expandido para visibilidade
                if (state.searchQuery.trim()) {
                    state.expandedDecks.add(deckId);
                }
                persistState();
                renderSidebar();
            }

            function toggleCategory(deckId, catIndex) {
                const key = `${deckId}|${catIndex}`;
                if (state.expandedCategories.has(key)) {
                    state.expandedCategories.delete(key);
                } else {
                    state.expandedCategories.add(key);
                }
                if (state.searchQuery.trim()) {
                    state.expandedCategories.add(key);
                }
                persistState();
                renderSidebar();
            }

            function openResume(deck, catIndex, itemIndex, cat, item) {
                state.activeResume = {
                    deckId: deck.id,
                    categoryIndex: catIndex,
                    itemIndex: itemIndex,
                    deckName: deck.name,
                    categoryName: cat.name,
                    itemName: item.name,
                    fileName: item.file,
                };
                // Expandir deck e categoria
                state.expandedDecks.add(deck.id);
                state.expandedCategories.add(`${deck.id}|${catIndex}`);
                persistState();
                renderSidebar();
                loadIframe(item.file);
                updateBreadcrumb(deck.name, cat.name, item.name);
                showIframe();
                // Scrollar item ativo para visibilidade
                setTimeout(() => {
                    const activeItem = $sidebarDecksList.querySelector('.resume-item.active');
                    if (activeItem) {
                        activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                }, 150);
            }

            function goBackToWelcome() {
                state.activeResume = null;
                persistState();
                renderSidebar();
                clearIframe();
                updateBreadcrumb(null, null, null);
                showWelcome();
            }

            function loadIframe(fileName) {
                $iframeLoader.classList.add('visible');
                $resumeIframe.classList.remove('loaded');
                // Pequeno delay para garantir que o loader apareça
                setTimeout(() => {
                    $resumeIframe.src = fileName;
                }, 60);
            }

            function clearIframe() {
                $resumeIframe.classList.remove('loaded');
                $resumeIframe.src = '';
                $iframeLoader.classList.remove('visible');
            }

            function showIframe() {
                $welcomeScreen.classList.add('hidden');
                $resumeIframe.style.display = '';
            }

            function showWelcome() {
                $welcomeScreen.classList.remove('hidden');
                $resumeIframe.style.display = 'none';
                $resumeIframe.classList.remove('loaded');
                $iframeLoader.classList.remove('visible');
                updateWelcomeStats();
            }

            function updateBreadcrumb(deckName, catName, itemName) {
                // Limpar breadcrumb (mantém o ícone home)
                const existingItems = $breadcrumbContainer.querySelectorAll(
                    '.breadcrumb-sep, .breadcrumb-item');
                existingItems.forEach(el => el.remove());

                if (!deckName && !itemName) {
                    const span = document.createElement('span');
                    span.className = 'breadcrumb-item current';
                    span.textContent = 'Nenhum resumo selecionado';
                    $breadcrumbContainer.appendChild(span);
                    return;
                }

                // Deck
                const deckSpan = document.createElement('span');
                deckSpan.className = 'breadcrumb-item clickable';
                deckSpan.textContent = deckName;
                deckSpan.addEventListener('click', goBackToWelcome);
                $breadcrumbContainer.appendChild(deckSpan);

                if (catName) {
                    const sep1 = document.createElement('span');
                    sep1.className = 'breadcrumb-sep';
                    sep1.textContent = '›';
                    $breadcrumbContainer.appendChild(sep1);

                    const catSpan = document.createElement('span');
                    catSpan.className = 'breadcrumb-item clickable';
                    catSpan.textContent = catName;
                    catSpan.addEventListener('click', goBackToWelcome);
                    $breadcrumbContainer.appendChild(catSpan);
                }

                if (itemName) {
                    const sep2 = document.createElement('span');
                    sep2.className = 'breadcrumb-sep';
                    sep2.textContent = '›';
                    $breadcrumbContainer.appendChild(sep2);

                    const itemSpan = document.createElement('span');
                    itemSpan.className = 'breadcrumb-item current';
                    itemSpan.textContent = itemName;
                    $breadcrumbContainer.appendChild(itemSpan);
                }
            }

            function updateWelcomeStats() {
                let totalDecks = DECKS.length;
                let totalCategories = 0;
                let totalItems = 0;
                DECKS.forEach(deck => {
                    totalCategories += deck.categories.length;
                    deck.categories.forEach(cat => { totalItems += cat.items.length; });
                });
                $welcomeStats.innerHTML = `
                    <div class="welcome-stat">
                        <div class="welcome-stat-value">${totalDecks}</div>
                        <div class="welcome-stat-label">Deck${totalDecks !== 1 ? 's' : ''}</div>
                    </div>
                    <div class="welcome-stat">
                        <div class="welcome-stat-value">${totalCategories}</div>
                        <div class="welcome-stat-label">Categorias</div>
                    </div>
                    <div class="welcome-stat">
                        <div class="welcome-stat-value">${totalItems}</div>
                        <div class="welcome-stat-label">Resumos</div>
                    </div>
                `;
            }

            // ============================================================
            // SIDEBAR VISIBILIDADE
            // ============================================================
            function setSidebarVisible(visible) {
                state.sidebarVisible = visible;
                if (visible) {
                    $sidebar.classList.remove('collapsed');
                    $sidebarOverlay.classList.remove('visible');
                } else {
                    $sidebar.classList.add('collapsed');
                    $sidebarOverlay.classList.remove('visible');
                }
                persistState();
            }

            function toggleSidebar() {
                setSidebarVisible(!state.sidebarVisible);
            }

            // ============================================================
            // PESQUISA / FILTRO
            // ============================================================
            function applySearchFilter(query) {
                const q = query.toLowerCase().trim();
                state.searchQuery = q;

                const allDecks = $sidebarDecksList.querySelectorAll('.deck-group');
                allDecks.forEach(deckEl => {
                    const deckId = deckEl.dataset.deckId;
                    let deckHasVisible = false;

                    const allCategories = deckEl.querySelectorAll('.category-group');
                    allCategories.forEach(catEl => {
                        const catKey = catEl.dataset.categoryKey;
                        let catHasVisible = false;

                        const allItems = catEl.querySelectorAll('.resume-item');
                        allItems.forEach(itemEl => {
                            const searchText = itemEl.dataset.searchText || '';
                            if (!q || searchText.includes(q)) {
                                itemEl.classList.remove('hidden-item');
                                catHasVisible = true;
                            } else {
                                itemEl.classList.add('hidden-item');
                            }
                        });

                        if (catHasVisible || !q) {
                            catEl.classList.remove('hidden-category');
                            deckHasVisible = true;
                            // Expandir categoria se houver match com query
                            if (q && catHasVisible) {
                                catEl.classList.add('expanded');
                            }
                        } else {
                            catEl.classList.add('hidden-category');
                        }
                    });

                    if (deckHasVisible || !q) {
                        deckEl.classList.remove('hidden-deck');
                        if (q && deckHasVisible) {
                            deckEl.classList.add('expanded');
                        }
                    } else {
                        deckEl.classList.add('hidden-deck');
                    }
                });
            }

            function clearSearch() {
                state.searchQuery = '';
                $sidebarSearch.value = '';
                applySearchFilter('');
                renderSidebar(); // Re-renderizar para restaurar estados de expansão originais
            }

            // ============================================================
            // TELA CHEIA
            // ============================================================
            function toggleFullscreen() {
                if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                    const el = document.getElementById('main-area');
                    if (el.requestFullscreen) {
                        el.requestFullscreen().catch(() => {});
                    } else if (el.webkitRequestFullscreen) {
                        el.webkitRequestFullscreen();
                    }
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    }
                }
            }

            function updateFullscreenUI(isFullscreen) {
                state.isFullscreen = isFullscreen;
                if (isFullscreen) {
                    $iconFsEnter.style.display = 'none';
                    $iconFsExit.style.display = '';
                    $btnFullscreen.setAttribute('data-tooltip', 'Sair da Tela Cheia');
                } else {
                    $iconFsEnter.style.display = '';
                    $iconFsExit.style.display = 'none';
                    $btnFullscreen.setAttribute('data-tooltip', 'Tela Cheia');
                }
            }

            // ============================================================
            // EVENT LISTENERS
            // ============================================================
            $btnToggleSidebar.addEventListener('click', toggleSidebar);
            $btnCloseSidebar.addEventListener('click', () => setSidebarVisible(false));
            $sidebarOverlay.addEventListener('click', () => setSidebarVisible(false));
            $btnBack.addEventListener('click', goBackToWelcome);
            $breadcrumbHome.addEventListener('click', goBackToWelcome);
            $btnFullscreen.addEventListener('click', toggleFullscreen);

            // Pesquisa
            $sidebarSearch.addEventListener('input', function() {
                const query = this.value;
                state.searchQuery = query;
                if (!query.trim()) {
                    // Ao limpar, re-renderizar para restaurar estados
                    renderSidebar();
                    state.searchQuery = '';
                } else {
                    applySearchFilter(query);
                }
            });
            // Tecla Escape limpa a pesquisa
            $sidebarSearch.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    clearSearch();
                    $sidebarSearch.blur();
                }
            });

            // Iframe: evento de carregamento
            $resumeIframe.addEventListener('load', function() {
                $iframeLoader.classList.remove('visible');
                $resumeIframe.classList.add('loaded');
            });

            // Iframe: tratamento de erro
            $resumeIframe.addEventListener('error', function() {
                $iframeLoader.classList.remove('visible');
                // Tenta mostrar mesmo assim
                $resumeIframe.classList.add('loaded');
            });

            // Detectar mudanças de tela cheia
            document.addEventListener('fullscreenchange', () => {
                updateFullscreenUI(!!document.fullscreenElement);
            });
            document.addEventListener('webkitfullscreenchange', () => {
                updateFullscreenUI(!!document.webkitFullscreenElement);
            });

            // Atalhos de teclado
            document.addEventListener('keydown', function(e) {
                // Ctrl+B ou Ctrl+Shift+B para toggle sidebar
                if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
                    e.preventDefault();
                    toggleSidebar();
                }
                // Ctrl+F ou / foca na pesquisa
                if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                    e.preventDefault();
                    setSidebarVisible(true);
                    setTimeout(() => $sidebarSearch.focus(), 300);
                }
                if (e.key === '/' && document.activeElement !== $sidebarSearch && document
                    .activeElement?.tagName !== 'INPUT' && document.activeElement?.tagName !==
                    'TEXTAREA') {
                    e.preventDefault();
                    setSidebarVisible(true);
                    setTimeout(() => $sidebarSearch.focus(), 300);
                }
                // Escape para voltar ao início
                if (e.key === 'Escape' && state.activeResume && document.activeElement === document
                    .body) {
                    goBackToWelcome();
                }
            });

            // Fechar sidebar ao clicar fora em mobile (overlay já trata)
            // Redimensionar: em telas grandes, garantir sidebar visível se estava
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768 && $sidebarOverlay.classList.contains(
                        'visible')) {
                    $sidebarOverlay.classList.remove('visible');
                }
            });

            // ============================================================
            // INICIALIZAÇÃO
            // ============================================================
            function init() {
                loadState();

                // Aplicar estado da sidebar
                if (state.sidebarVisible) {
                    $sidebar.classList.remove('collapsed');
                } else {
                    $sidebar.classList.add('collapsed');
                }

                // Renderizar sidebar
                renderSidebar();

                // Atualizar welcome stats
                updateWelcomeStats();

                // Se havia um resumo ativo salvo, restaurá-lo
                if (state.activeResume && state.activeResume.fileName) {
                    const ar = state.activeResume;
                    updateBreadcrumb(ar.deckName, ar.categoryName, ar.itemName);
                    loadIframe(ar.fileName);
                    showIframe();
                    // Garantir expansão
                    state.expandedDecks.add(ar.deckId);
                    state.expandedCategories.add(`${ar.deckId}|${ar.categoryIndex}`);
                    persistState();
                    renderSidebar();
                    // Scrollar para o item ativo
                    setTimeout(() => {
                        const activeItem = $sidebarDecksList.querySelector('.resume-item.active');
                        if (activeItem) {
                            activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }
                    }, 300);
                } else {
                    updateBreadcrumb(null, null, null);
                    showWelcome();
                }

                // Estado inicial de fullscreen
                updateFullscreenUI(!!document.fullscreenElement || !!document.webkitFullscreenElement);

                console.log('%c🚀 Hub de Estudos inicializado com sucesso!',
                    'color: #a78bfa; font-size: 1.1rem; font-weight: bold;');
                console.log('%c📚 Decks: ' + DECKS.length + ' | Categorias: ' + DECKS.reduce((acc, d) => acc + d
                    .categories.length, 0) + ' | Resumos: ' + DECKS.reduce((acc, d) => acc + d.categories.reduce(
                        (a, c) => a + c.items.length, 0), 0),
                    'color: #b0b0c8;');
                console.log('%c💡 Dica: Use Ctrl+B para alternar a sidebar, / para pesquisar.',
                    'color: #7878a0; font-style: italic;');
            }

            // Iniciar a aplicação
            init();

            // ============================================================
            // EXPOR API PARA CONSOLE (debug)
            // ============================================================
            window.HubEstudos = {
                decks: DECKS,
                state,
                goBackToWelcome,
                toggleSidebar,
                setSidebarVisible,
                toggleFullscreen,
                clearSearch,
                renderSidebar,
                persistState,
                openResume,
                getStats: () => ({
                    decks: DECKS.length,
                    categories: DECKS.reduce((acc, d) => acc + d.categories.length, 0),
                    items: DECKS.reduce((acc, d) => acc + d.categories.reduce((a, c) => a + c.items
                        .length, 0), 0),
                }),
            };

            console.log('%c📋 API disponível em window.HubEstudos', 'color: #7878a0;');
        })();
    </script>
</body>
</html>
